ai_usage_summary: |
  AI tools (Claude/Gemini) were utilized strictly and exclusively for domain knowledge gathering, initial data exploration, and drafting documentation summaries.
  All core ranking algorithms, honeypot detection rules, and Python codebase implementation were developed independently by Team Titan.
  Zero candidate data or personally identifiable information (PII) was transmitted outside the sandboxed local evaluation environment.

methodology_summary: |
  Team Titan engineered a 10-Stage Statistical & Semantic Hybrid Ranking Pipeline specifically tailored for Redrob AI's Founding Team Senior AI Engineer mandate. Our architecture evaluates all 100,000 candidate profiles locally in ~24 seconds via streaming generators (consuming only ~145 MB RAM):
  
  1. Job Intelligence & Taxonomy Engine: Builds domain taxonomies (Foundational ML, Distributed Vector DBs, Quant Eval) and prioritizes product builders over outsourced services backgrounds.
  2. Streaming Ingestion Engine: Memory-efficient JSONL streaming into strongly-typed CandidateProfile dataclasses without loading the full corpus into memory.
  3. Behavioral Signal Analyzer: Computes a hiring availability envelope (0.60x to 1.10x multiplier) using recruiter response recency, login frequency, and immediate notice period availability.
  4. Honeypot & Trap Disqualification Engine: Identifies synthetic profile injection (claiming expert skills with <6 months experience or impossible career chronology), locking traps to 0.0000.
  5. Two-Pass Corpus TF-IDF Engine (Pass 1): Scans all 100,000 profiles to learn global vocabulary frequencies. Rare infrastructure terms ('qlora', 'weaviate', 'hnsw', 'ndcg') receive dynamically boosted IDF multipliers to neutralize buzzword stuffing.
  6. Hybrid Semantic Evaluation (Pass 2): Scores candidate descriptions against learned TF-IDF domain weights while normalizing keyword spam from wrapper libraries.
  7. Experience Sweet-Spot Targeting: Favors candidates in the 5–9 year career sweet spot required for senior founding roles.
  8. Anti-Job-Hopping Penalty: Habitual job-hoppers ('title chasers' averaging <18 months tenure across >=3 roles) receive a sharp -40% multiplier penalty.
  9. Deterministic Ranking Equation: Synthesizes multi-dimensional scores with secondary deterministic sorting by candidate_id, guaranteeing 100% run-to-run reproducibility.
  10. Explainability Engine: Automatically generates concise 1–2 sentence recruiter justification narratives explaining the exact rationale behind each top 100 recommendation.

